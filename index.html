<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saif Logo Studio | Final Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <style>
        :root { --p-color: #312e81; }
        .bg-primary { background-color: var(--p-color); }
        .text-primary { color: var(--p-color); }
        #order-success-screen { display: none; position: fixed; inset: 0; background: white; z-index: 1000; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .offer-glow { animation: pulse-gold 2s infinite; border-bottom: 2px solid #ffd700; }
        @keyframes pulse-gold { 0% { background-color: #1e1b4b; } 50% { background-color: #312e81; } 100% { background-color: #1e1b4b; } }
    </style>
</head>
<body class="bg-slate-50 font-sans">

    <div id="order-success-screen">
        <div class="text-7xl mb-4">🎉</div>
        <h2 class="text-3xl font-black text-indigo-900 uppercase">Order Placed!</h2>
        <p class="text-lg font-bold text-green-600 mt-2">Thank you! Your order is registered.</p>
        
        <div class="bg-indigo-50 p-6 rounded-3xl mt-6 border-2 border-dashed border-indigo-200 w-full max-w-sm mx-auto">
            <p class="text-gray-700 font-medium">Your logo will be ready in <span class="text-indigo-900 font-black">24-48 hours</span>.</p>
            <div class="h-[1px] bg-indigo-200 my-4"></div>
            
            <div class="bg-white p-4 rounded-2xl shadow-inner mb-4">
                 <p class="text-[10px] font-bold text-gray-400 uppercase">Pay to Start Work</p>
                 <h3 id="final-pay-display" class="text-4xl font-black text-primary">₹0</h3>
            </div>
            
            <button onclick="payViaUPI()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-bold flex items-center justify-center gap-2 shadow-lg active:scale-95 transition-all">
                <img src="https://www.vectorlogo.zone/logos/upi/upi-icon.svg" class="w-6 h-6 bg-white rounded p-0.5">
                PAY NOW (UPI)
            </button>
        </div>
        <button onclick="location.reload()" class="mt-8 text-gray-400 font-bold text-sm underline">Back to Home</button>
    </div>

    <div id="user-view">
        <nav class="bg-primary p-4 text-white flex justify-between items-center shadow-lg sticky top-0 z-50">
            <div class="flex items-center gap-2 cursor-pointer" onclick="checkAdmin()">
                <div class="w-8 h-8 bg-yellow-400 rounded flex items-center justify-center font-black text-indigo-900">S</div>
                <h1 class="font-black italic text-sm tracking-tighter uppercase">SAIF STUDIO</h1>
            </div>
        </nav>

        <div class="bg-indigo-950 text-white text-center py-2 text-[10px] font-bold uppercase offer-glow">
            🔥 Use Code <span class="text-yellow-400">WELCOME24</span> for 20% OFF 🔥
        </div>

        <main class="max-w-4xl mx-auto p-4 pb-20">
            <section class="py-4">
                <div class="bg-white p-6 rounded-[2.5rem] shadow-xl border-b-8 border-primary">
                    <div class="space-y-4">
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 ml-2 uppercase">Logo Category</label>
                            <select id="c-cat" onchange="resetCouponAndPrice()" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold outline-none">
                                <option value="simple">Simple Logo (₹99)</option>
                                <option value="3d">3D Logo (₹199)</option>
                                <option value="animation">Animation Logo (₹499)</option>
                            </select>
                        </div>
                        
                        <div class="flex justify-between items-center p-4 bg-indigo-50 rounded-2xl border border-indigo-100">
                            <span class="text-xs font-black uppercase text-indigo-400">Price:</span>
                            <span id="price-tag" class="font-black text-primary text-2xl">₹99</span>
                        </div>

                        <div class="flex gap-2">
                            <input type="text" id="cp-in" placeholder="Coupon Code" class="flex-1 p-3 bg-slate-50 border rounded-xl text-xs uppercase outline-none border-indigo-100">
                            <button onclick="applyCoupon()" class="bg-black text-white px-6 rounded-xl text-[10px] font-bold">APPLY</button>
                        </div>

                        <div class="space-y-3">
                            <input type="text" id="c-name" placeholder="Full Name" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none">
                            <input type="tel" id="c-phone" placeholder="WhatsApp Number" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none">
                            <textarea id="c-idea" placeholder="Logo Details..." class="w-full p-4 bg-slate-50 border rounded-2xl h-24 outline-none"></textarea>
                        </div>

                        <button onclick="placeOrder()" class="w-full bg-primary text-white font-black py-5 rounded-2xl shadow-xl active:scale-95 text-lg uppercase">Confirm Order</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div id="admin-view" class="hidden min-h-screen bg-slate-100 p-4">
        <div class="max-w-6xl mx-auto">
            <h2 class="font-black text-primary uppercase mb-6">Admin Panel</h2>
            <div id="admin-orders-list" class="space-y-4"></div>
            <button onclick="location.reload()" class="mt-8 bg-red-600 text-white px-4 py-2 rounded font-bold text-xs">LOGOUT</button>
        </div>
    </div>

    <script>
        const MY_UPI_ID = "7210065769@ibl"; 
        const MERCHANT_NAME = "Saif Logo Studio";

        const firebaseConfig = {
            apiKey: "AIzaSyA-5oN6F82QqpoRPzJoMiVO3Ks1A88Xs10",
            authDomain: "saiflogostudio.firebaseapp.com",
            projectId: "saiflogostudio",
            storageBucket: "saiflogostudio.firebasestorage.app",
            messagingSenderId: "763057407060",
            appId: "1:763057407060:web:c17918f45dea1076d299c1"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let basePrices = { simple: 99, '3d': 199, animation: 499 };
        let finalPrice = 99;
        let discountApplied = false;

        function resetCouponAndPrice() {
            discountApplied = false;
            document.getElementById('cp-in').value = "";
            const cat = document.getElementById('c-cat').value;
            finalPrice = basePrices[cat];
            document.getElementById('price-tag').innerText = "₹" + finalPrice;
        }

        function applyCoupon() {
            const code = document.getElementById('cp-in').value.trim().toUpperCase();
            const cat = document.getElementById('c-cat').value;
            
            if(code === "WELCOME24") {
                finalPrice = Math.floor(basePrices[cat] * 0.8);
                discountApplied = true;
                alert("Coupon Applied! 20% Discounted.");
            } else {
                finalPrice = basePrices[cat];
                discountApplied = false;
                alert("Invalid Code");
            }
            document.getElementById('price-tag').innerText = "₹" + finalPrice;
        }

        function payViaUPI() {
            window.location.href = `upi://pay?pa=${MY_UPI_ID}&pn=${encodeURIComponent(MERCHANT_NAME)}&am=${finalPrice}&cu=INR&tn=LogoOrder`;
        }

        function placeOrder() {
            const n = document.getElementById('c-name').value;
            const ph = document.getElementById('c-phone').value;
            if(!n || !ph) return alert("Fill Name and Number!");

            db.collection("orders").add({
                name: n, phone: ph, idea: document.getElementById('c-idea').value,
                category: document.getElementById('c-cat').value,
                price: finalPrice, status: 'Pending', time: new Date()
            }).then(() => {
                confetti();
                document.getElementById('final-pay-display').innerText = "₹" + finalPrice;
                document.getElementById('order-success-screen').style.display = 'flex';
            });
        }

        function checkAdmin() {
            if(prompt("Admin Password:") === "Saif2012") {
                document.getElementById('user-view').classList.add('hidden');
                document.getElementById('admin-view').classList.remove('hidden');
                syncAdmin();
            }
        }

        function syncAdmin() {
            db.collection("orders").orderBy("time", "desc").onSnapshot(snap => {
                const list = document.getElementById('admin-orders-list');
                list.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    list.innerHTML += `<div class="bg-white p-4 rounded-xl shadow-md border-l-4 border-indigo-900">
                        <p class="font-bold text-sm uppercase">${d.name} (${d.category})</p>
                        <p class="text-xs">Price: ₹${d.price} | Ph: ${d.phone}</p>
                        <button onclick="window.open('https://wa.me/91${d.phone}')" class="bg-green-600 text-white px-3 py-1 rounded text-[10px] mt-2">WhatsApp</button>
                    </div>`;
                });
            });
        }
    </script>
</body>
</html>
