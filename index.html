<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saif Logo Studio | Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <style>
        :root { --p-color: #312e81; }
        .bg-primary { background-color: var(--p-color); }
        .text-primary { color: var(--p-color); }
        
        /* New Offer Animation */
        .offer-glow { 
            animation: pulse-gold 2s infinite; 
            border-bottom: 2px solid #ffd700;
        }
        @keyframes pulse-gold {
            0% { background-color: #1e1b4b; transform: scale(1); }
            50% { background-color: #312e81; transform: scale(1.02); }
            100% { background-color: #1e1b4b; transform: scale(1); }
        }

        .stat-card { background: white; border-radius: 1rem; padding: 1rem; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-top: 4px solid var(--p-color); }
        
        #thank-you-screen {
            display: none;
            position: fixed;
            inset: 0;
            background: white;
            z-index: 999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .success-icon { font-size: 80px; animation: pop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }
    </style>
</head>
<body class="bg-slate-50 font-sans">

    <div id="thank-you-screen">
        <div class="success-icon">✅</div>
        <h2 class="text-3xl font-black text-indigo-900 mt-4 text-center">ORDER RECEIVED!</h2>
        <p class="text-gray-500 font-bold mt-2">Checking your details...</p>
        <button onclick="document.getElementById('thank-you-screen').style.display='none'" class="mt-6 bg-primary text-white px-8 py-2 rounded-full font-bold">CLOSE</button>
    </div>

    <div id="top-bar" class="bg-indigo-950 text-white text-center py-2 text-[11px] font-bold uppercase offer-glow sticky top-0 z-[100] transition-all">
        🔥 <span id="header-offer-display">Loading Offer...</span> 🔥
    </div>

    <div id="user-view">
        <nav class="bg-primary p-4 text-white flex justify-between items-center shadow-lg">
            <div class="flex items-center gap-2 cursor-pointer" onclick="checkAdmin()">
                <div class="w-8 h-8 bg-yellow-400 rounded flex items-center justify-center font-black text-indigo-900">S</div>
                <h1 class="font-black italic text-sm">SAIF STUDIO</h1>
            </div>
            <div class="flex items-center gap-3">
                <select id="lang-mod" onchange="changeLang()" class="bg-indigo-800 text-white text-[10px] rounded px-2 py-1 outline-none border border-indigo-400">
                    <option value="hi">हिंदी (HI)</option>
                    <option value="en">ENGLISH (EN)</option>
                </select>
                <div class="flex gap-3 text-[10px] font-bold uppercase">
                    <button onclick="showSec('home')">Home</button>
                    <button onclick="showSec('track')">Track</button>
                </div>
            </div>
        </nav>

        <main class="max-w-4xl mx-auto p-4">
            <section id="sec-home" class="view-sec py-4">
                <div class="text-center mb-6">
                    <h2 id="main-hero" class="text-3xl font-black text-primary italic uppercase">अपनी पहचान बनाएं</h2>
                </div>
                <div class="bg-white p-6 rounded-[2rem] shadow-xl border-b-8 border-primary">
                    <div class="space-y-3">
                        <select id="c-cat" onchange="updatePrice()" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold">
                            <option value="simple">Simple Logo</option>
                            <option value="3d">3D Logo</option>
                            <option value="animation">Animation Logo</option>
                        </select>
                        <div class="flex justify-between p-3 bg-indigo-50 rounded-xl border border-indigo-100">
                            <span id="lbl-price" class="text-xs font-bold uppercase">Price:</span>
                            <span id="price-tag" class="font-black text-primary">₹0</span>
                        </div>
                        <div class="flex gap-2">
                            <input type="text" id="cp-in" placeholder="Coupon Code" class="flex-1 p-3 bg-slate-50 border rounded-xl text-xs uppercase outline-none">
                            <button onclick="applyCoupon()" class="bg-black text-white px-4 rounded-xl text-[10px] font-bold">APPLY</button>
                        </div>
                        <input type="text" id="c-name" placeholder="Full Name" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none">
                        <input type="tel" id="c-phone" placeholder="WhatsApp Number" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none">
                        <textarea id="c-idea" placeholder="Logo idea..." class="w-full p-4 bg-slate-50 border rounded-2xl h-24 outline-none"></textarea>
                        <button onclick="placeOrder()" id="btn-place" class="w-full bg-primary text-white font-black py-4 rounded-2xl shadow-lg transform active:scale-95 transition">PLACE ORDER</button>
                    </div>
                </div>
            </section>
            
            <section id="sec-track" class="view-sec hidden py-4">
                <div class="bg-white p-6 rounded-3xl shadow-xl border-l-8 border-primary">
                    <h2 class="font-black mb-4 uppercase italic">Track Your Order</h2>
                    <input type="tel" id="t-ph" placeholder="Enter WhatsApp Number" class="w-full p-4 border rounded-2xl mb-4 outline-none">
                    <button onclick="trackOrder()" class="w-full bg-primary text-white py-4 rounded-2xl font-bold">CHECK STATUS</button>
                    <div id="t-res" class="mt-4 p-4 bg-slate-50 hidden rounded-xl border-2 border-dashed border-primary text-sm">
                        </div>
                </div>
            </section>

            <section id="sec-help" class="view-sec hidden py-4">
                 <div class="bg-white p-6 rounded-3xl shadow-lg border-t-8 border-red-500">
                    <h2 class="font-black text-red-600 mb-4">COMPLAINT / HELP</h2>
                    <input type="text" id="comp-name" placeholder="Your Name" class="w-full p-4 border rounded-2xl mb-2">
                    <textarea id="comp-text" placeholder="Write your complaint..." class="w-full p-4 border rounded-2xl h-24 mb-4"></textarea>
                    <button onclick="sendComp()" class="w-full bg-red-600 text-white py-3 rounded-2xl font-bold">SUBMIT COMPLAINT</button>
                 </div>
            </section>
        </main>

        <div class="fixed bottom-4 right-4 z-50">
            <button onclick="showSec('help')" class="bg-red-600 text-white px-4 py-2 rounded-full shadow-2xl font-bold text-[10px]">COMPLAINT</button>
        </div>
    </div>

    <div id="admin-view" class="hidden min-h-screen bg-slate-100 p-4">
        <div class="max-w-6xl mx-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="font-black text-primary italic uppercase underline">Master Dashboard</h2>
                <button onclick="location.reload()" class="bg-red-600 text-white px-4 py-1 rounded text-[10px] font-bold">EXIT</button>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                <div class="stat-card">
                    <p class="text-[10px] font-bold text-gray-400">TOTAL ORDERS</p>
                    <h3 id="stat-total" class="text-2xl font-black text-indigo-600">0</h3>
                </div>
                <div class="stat-card" style="border-top-color: #ef4444;">
                    <p class="text-[10px] font-bold text-gray-400">PENDING</p>
                    <h3 id="stat-pending" class="text-2xl font-black text-red-500">0</h3>
                </div>
                <div class="stat-card" style="border-top-color: #22c55e;">
                    <p class="text-[10px] font-bold text-gray-400">REVENUE</p>
                    <h3 id="stat-rev" class="text-2xl font-black text-green-600">₹0</h3>
                </div>
                <div class="stat-card" style="border-top-color: #f59e0b;">
                    <p class="text-[10px] font-bold text-gray-400">COMPLAINTS</p>
                    <h3 id="stat-comp" class="text-2xl font-black text-yellow-600">0</h3>
                </div>
            </div>

            <div class="bg-white p-5 rounded-2xl shadow-sm mb-6 border">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold">OFFER BAR TEXT:</label>
                        <input type="text" id="set-offer-text" class="w-full p-2 border rounded text-xs" placeholder="Ex: First order 50% Off!">
                    </div>
                    <div class="grid grid-cols-3 gap-2">
                        <div><label class="text-[8px]">Simple ₹</label><input type="number" id="set-p-simple" class="w-full p-2 border rounded text-xs"></div>
                        <div><label class="text-[8px]">3D ₹</label><input type="number" id="set-p-3d" class="w-full p-2 border rounded text-xs"></div>
                        <div><label class="text-[8px]">Anim ₹</label><input type="number" id="set-p-anim" class="w-full p-2 border rounded text-xs"></div>
                    </div>
                </div>
                <button onclick="saveSettings()" class="w-full bg-black text-white py-2 rounded-xl text-xs font-bold mt-4">UPDATE WEBSITE</button>
            </div>

            <div id="admin-orders-list" class="space-y-4"></div>
            <div id="admin-comp-list" class="mt-8 space-y-2"></div>
        </div>
    </div>

    <script>
        const myWhatsApp = "8796914489";
        const firebaseConfig = {
            apiKey: "AIzaSyA-5oN6F82QqpoRPzJoMiVO3Ks1A88Xs10",
            authDomain: "saiflogostudio.firebaseapp.com",
            projectId: "saiflogostudio",
            storageBucket: "saiflogostudio.firebasestorage.app",
            messagingSenderId: "763057407060",
            appId: "1:763057407060:web:c17918f45dea1076d299c1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let prices = { simple: 99, '3d': 199, animation: 499 };
        let finalPrice = 0;

        const trans = {
            hi: { hero: "अपनी पहचान बनाएं", btn: "PLACE ORDER", price: "Price:" },
            en: { hero: "CREATE YOUR IDENTITY", btn: "SUBMIT ORDER", price: "Total:" }
        };

        function changeLang() {
            const l = document.getElementById('lang-mod').value;
            document.getElementById('main-hero').innerText = trans[l].hero;
            document.getElementById('btn-place').innerText = trans[l].btn;
            document.getElementById('lbl-price').innerText = trans[l].price;
        }

        function updatePrice() {
            finalPrice = prices[document.getElementById('c-cat').value];
            document.getElementById('price-tag').innerText = "₹" + finalPrice;
        }

        function applyCoupon() {
            const code = document.getElementById('cp-in').value.toUpperCase();
            if(code === "SAIF50") {
                finalPrice = Math.floor(finalPrice * 0.5);
                document.getElementById('price-tag').innerText = "₹" + finalPrice + " (OFFER!)";
                alert("Coupon Applied!");
            } else { alert("Wrong Coupon"); }
        }

        function placeOrder() {
            const n = document.getElementById('c-name').value;
            const ph = document.getElementById('c-phone').value;
            const id = document.getElementById('c-idea').value;
            const ct = document.getElementById('c-cat').value;
            if(!n || !ph) return alert("Details bharo!");

            db.collection("orders").add({ name: n, phone: ph, idea: id, category: ct, price: finalPrice, status: 'Pending', time: new Date() })
            .then(() => {
                confetti();
                document.getElementById('thank-you-screen').style.display = 'flex';
                // No WhatsApp Redirect here anymore!
            });
        }

        function trackOrder() {
            const ph = document.getElementById('t-ph').value;
            const res = document.getElementById('t-res');
            if(!ph) return alert("Number dalo!");

            db.collection("orders").where("phone", "==", ph).orderBy("time", "desc").limit(1).get().then(snap => {
                res.classList.remove('hidden');
                if(snap.empty) {
                    res.innerHTML = "❌ Order not found!";
                } else {
                    snap.forEach(doc => {
                        const d = doc.data();
                        res.innerHTML = `
                            <p><b>Order Status:</b> <span class="text-blue-600">${d.status}</span></p>
                            <p><b>Price:</b> ₹${d.price}</p>
                            <p><b>Reply:</b> ${d.reply || 'Checking your idea...'}</p>
                        `;
                    });
                }
            });
        }

        function sendComp() {
            const n = document.getElementById('comp-name').value;
            const t = document.getElementById('comp-text').value;
            if(!n || !t) return alert("Fill form!");
            db.collection("complaints").add({ name: n, text: t, time: new Date() }).then(() => {
                alert("Complaint Sent!");
                showSec('home');
            });
        }

        function checkAdmin() {
            if(prompt("Admin Key:") === "Saif2012") {
                document.getElementById('user-view').classList.add('hidden');
                document.getElementById('admin-view').classList.remove('hidden');
                syncAdmin();
            }
        }

        function syncAdmin() {
            db.collection("orders").orderBy("time", "desc").onSnapshot(snap => {
                let total = snap.size, pending = 0, revenue = 0;
                const list = document.getElementById('admin-orders-list');
                list.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    const oid = doc.id;
                    if(d.status === 'Pending') pending++;
                    if(d.status === 'Done') revenue += Number(d.price);

                    list.innerHTML += `
                        <div class="bg-white p-4 rounded-xl border-l-4 ${d.status==='Pending'?'border-red-500':'border-green-500'} shadow-sm">
                            <p class="font-black text-sm">${d.name} (${d.category})</p>
                            <p class="text-[10px] text-gray-400">₹${d.price} - ${d.idea}</p>
                            <div class="mt-2 flex gap-2">
                                <input id="r-${oid}" class="flex-1 p-1 border text-[10px]" placeholder="Reply..." value="${d.reply || ''}">
                                <button onclick="updateStat('${oid}','Done', '${d.phone}', '${d.name}')" class="bg-green-600 text-white px-2 py-1 rounded text-[10px]">DONE</button>
                                <button onclick="cancelOrder('${oid}','${d.phone}')" class="bg-red-500 text-white px-2 py-1 rounded text-[10px]">CANCEL</button>
                                <button onclick="delDoc('orders','${oid}')" class="text-gray-300">✕</button>
                            </div>
                        </div>`;
                });
                document.getElementById('stat-total').innerText = total;
                document.getElementById('stat-pending').innerText = pending;
                document.getElementById('stat-rev').innerText = "₹" + revenue;
            });

            db.collection("complaints").onSnapshot(snap => {
                document.getElementById('stat-comp').innerText = snap.size;
                const cl = document.getElementById('admin-comp-list');
                cl.innerHTML = `<h3 class="text-xs font-bold text-red-500">COMPLAINTS</h3>`;
                snap.forEach(doc => {
                    cl.innerHTML += `<div class="bg-white p-2 text-[10px] border flex justify-between">
                        <span><b>${doc.data().name}:</b> ${doc.data().text}</span>
                        <button onclick="delDoc('complaints','${doc.id}')" class="text-red-500">✕</button>
                    </div>`;
                });
            });
        }

        function saveSettings() {
            const offer = document.getElementById('set-offer-text').value;
            const s = document.getElementById('set-p-simple').value;
            const t = document.getElementById('set-p-3d').value;
            const a = document.getElementById('set-p-anim').value;
            db.collection("settings").doc("main").set({
                offerText: offer, simple: Number(s), '3d': Number(t), animation: Number(a)
            }).then(() => alert("Saved!"));
        }

        // WhatsApp trigger only on CONFIRM
        function updateStat(id, s, ph, name) {
            const reply = document.getElementById('r-'+id).value;
            db.collection("orders").doc(id).update({ status: s, reply: reply }).then(() => {
                window.open(`https://wa.me/91${ph}?text=Hello ${name}, your order is CONFIRMED!%0AStatus: DONE%0ANote: ${reply}`);
            });
        }

        // WhatsApp trigger only on CANCEL
        function cancelOrder(id, ph) {
            db.collection("orders").doc(id).update({ status: 'Cancelled' }).then(() => {
                window.open(`https://wa.me/91${ph}?text=Sorry! Your order has been cancelled by Saif Studio.`);
            });
        }

        function delDoc(col, id) { if(confirm("Delete?")) db.collection(col).doc(id).delete(); }
        
        function showSec(id) {
            document.querySelectorAll('.view-sec').forEach(s => s.classList.add('hidden'));
            document.getElementById('sec-' + id).classList.remove('hidden');
        }

        db.collection("settings").doc("main").onSnapshot(doc => {
            if(doc.exists) {
                const d = doc.data();
                document.getElementById('header-offer-display').innerText = d.offerText;
                prices = { simple: d.simple, '3d': d['3d'], animation: d.animation };
                document.getElementById('set-p-simple').value = d.simple;
                document.getElementById('set-p-3d').value = d['3d'];
                document.getElementById('set-p-anim').value = d.animation;
                updatePrice();
            }
        });
    </script>
</body>
</html>
