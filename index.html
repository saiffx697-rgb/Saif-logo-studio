<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saif Logo Studio | Final Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <style>
        :root { --p-color: #312e81; }
        .bg-primary { background-color: var(--p-color); }
        .text-primary { color: var(--p-color); }
        .offer-glow { animation: pulse-gold 2s infinite; border-bottom: 2px solid #ffd700; }
        @keyframes pulse-gold {
            0% { background-color: #1e1b4b; transform: scale(1); }
            50% { background-color: #312e81; transform: scale(1.02); }
            100% { background-color: #1e1b4b; transform: scale(1); }
        }
        .stat-card { background: white; border-radius: 1rem; padding: 1rem; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-top: 4px solid var(--p-color); }
        #thank-you-screen { display: none; position: fixed; inset: 0; background: white; z-index: 999; flex-direction: column; align-items: center; justify-content: center; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .star-btn { font-size: 30px; cursor: pointer; color: #d1d5db; transition: 0.2s; }
        .star-btn.active { color: #facc15; }
    </style>
</head>
<body class="bg-slate-50 font-sans">

    <div id="thank-you-screen">
        <div class="text-6xl mb-4">✅</div>
        <h2 class="text-3xl font-black text-indigo-900 mt-4 text-center uppercase">Order Received!</h2>
        <p class="text-gray-500 font-bold mt-2 text-center px-6">आपका आर्डर दर्ज हो गया है।</p>
        
        <div class="mt-8 bg-indigo-50 p-6 rounded-3xl border-2 border-dashed border-indigo-200">
            <p class="text-[10px] font-black text-indigo-400 uppercase mb-2">Rate Our Website</p>
            <div class="flex gap-2 justify-center">
                <span class="star-btn" onclick="rate(1)">★</span>
                <span class="star-btn" onclick="rate(2)">★</span>
                <span class="star-btn" onclick="rate(3)">★</span>
                <span class="star-btn" onclick="rate(4)">★</span>
                <span class="star-btn" onclick="rate(5)">★</span>
            </div>
        </div>

        <button onclick="document.getElementById('thank-you-screen').style.display='none'; showSec('track')" class="mt-6 bg-primary text-white px-10 py-4 rounded-full font-bold shadow-xl active:scale-95 transition">GO TO PAYMENT</button>
    </div>

    <div id="top-bar" class="bg-indigo-950 text-white text-center py-2 text-[11px] font-bold uppercase offer-glow sticky top-0 z-[100]">
        🔥 <span id="header-offer-display">Loading Offer...</span> 🔥
    </div>

    <div id="user-view">
        <nav class="bg-primary p-4 text-white flex justify-between items-center shadow-lg">
            <div class="flex items-center gap-2 cursor-pointer" onclick="checkAdmin()">
                <div class="w-8 h-8 bg-yellow-400 rounded flex items-center justify-center font-black text-indigo-900 shadow-inner">S</div>
                <h1 class="font-black italic text-sm tracking-tighter">SAIF STUDIO</h1>
            </div>
            <div class="flex gap-4 text-[10px] font-bold uppercase tracking-widest">
                <button onclick="showSec('home')" class="hover:text-yellow-400">Order</button>
                <button onclick="showSec('track')" class="hover:text-yellow-400">Track/Pay</button>
            </div>
        </nav>

        <main class="max-w-4xl mx-auto p-4 space-y-6">
            
            <section id="sec-home" class="view-sec py-4">
                <div class="bg-white p-6 rounded-[2rem] shadow-xl border-b-8 border-primary">
                    <div class="space-y-3">
                        <select id="c-cat" onchange="updatePrice()" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold outline-none">
                            <option value="simple">Simple Logo</option>
                            <option value="3d">3D Logo</option>
                            <option value="animation">Animation Logo</option>
                        </select>
                        <div class="flex justify-between items-center p-4 bg-indigo-50 rounded-2xl">
                            <span class="text-xs font-black uppercase text-indigo-400">Price:</span>
                            <span id="price-tag" class="font-black text-primary text-2xl">₹0</span>
                        </div>
                        <div class="flex gap-2">
                            <input type="text" id="cp-in" placeholder="Coupon Code" class="flex-1 p-3 bg-slate-50 border rounded-xl text-xs uppercase outline-none border-indigo-100">
                            <button onclick="applyCoupon()" class="bg-black text-white px-6 rounded-xl text-[10px] font-bold shadow-md">APPLY</button>
                        </div>
                        <input type="text" id="c-name" placeholder="आपका पूरा नाम" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none">
                        <input type="tel" id="c-phone" placeholder="WhatsApp नंबर" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none">
                        <textarea id="c-idea" placeholder="लोगो का नाम लिखें..." class="w-full p-4 bg-slate-50 border rounded-2xl h-24 outline-none"></textarea>
                        <button onclick="placeOrder()" class="w-full bg-primary text-white font-black py-5 rounded-2xl shadow-xl active:scale-95 text-lg uppercase tracking-tighter">Place Order</button>
                    </div>
                </div>
            </section>
            
            <section id="sec-track" class="view-sec hidden py-4 space-y-4">
                <div class="bg-white p-5 rounded-2xl shadow-lg border border-indigo-100">
                    <p class="font-black text-primary text-xs mb-3 uppercase italic">Track & Reply</p>
                    <div class="flex gap-2">
                        <input type="tel" id="tr-num" placeholder="Enter Number" class="flex-1 p-3 border rounded-xl text-xs outline-none bg-slate-50">
                        <button onclick="trackMyOrder()" class="bg-indigo-600 text-white px-4 rounded-xl text-[10px] font-bold uppercase">Check</button>
                    </div>
                    <div id="track-box" class="hidden mt-4 p-4 rounded-xl bg-indigo-50 border border-indigo-200">
                        <p class="text-[10px] font-bold text-indigo-400 uppercase">Status</p>
                        <p id="st-val" class="font-black text-indigo-900"></p>
                        <p id="st-reply" class="text-xs text-indigo-600 italic mt-2 mt-2 bg-white p-2 rounded border border-indigo-100"></p>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-3xl shadow-xl border-l-8 border-green-500 text-center">
                    <h3 id="pay-display-price" class="text-5xl font-black text-primary mb-6">₹0</h3>
                    <button onclick="payViaUPI()" class="w-full bg-green-600 text-white py-5 rounded-2xl font-bold flex items-center justify-center gap-3 shadow-lg active:scale-95 transition-all uppercase text-sm">
                        PAY VIA UPI
                    </button>
                </div>
            </section>
        </main>
    </div>

    <div id="admin-view" class="hidden min-h-screen bg-slate-100 p-4 pb-20">
        <div class="max-w-6xl mx-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="font-black text-primary uppercase italic underline">Saif Master Dashboard</h2>
                <button onclick="location.reload()" class="bg-red-600 text-white px-4 py-1 rounded text-[10px] font-bold">LOGOUT</button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                <div class="stat-card"><p class="text-[10px] font-bold text-gray-400 uppercase">Orders</p><h3 id="stat-total" class="text-2xl font-black">0</h3></div>
                <div class="stat-card" style="border-top-color: #ef4444;"><p class="text-[10px] font-bold text-gray-400 uppercase">Pending</p><h3 id="stat-pending" class="text-2xl font-black">0</h3></div>
                <div class="stat-card" style="border-top-color: #22c55e;"><p class="text-[10px] font-bold text-gray-400 uppercase">Revenue</p><h3 id="stat-rev" class="text-2xl font-black text-green-600">₹0</h3></div>
            </div>

            <div class="bg-white p-5 rounded-2xl shadow-sm mb-6 border">
                <p class="font-bold text-xs mb-3 text-indigo-400">STORE SETTINGS</p>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="set-offer-text" placeholder="Top Bar Message" class="p-2 border rounded text-xs">
                    <div class="flex gap-2">
                        <input type="number" id="set-p-simple" placeholder="Simple ₹" class="w-1/3 p-2 border rounded text-xs">
                        <input type="number" id="set-p-3d" placeholder="3D ₹" class="w-1/3 p-2 border rounded text-xs">
                        <input type="number" id="set-p-anim" placeholder="Anim ₹" class="w-1/3 p-2 border rounded text-xs">
                    </div>
                </div>
                <button onclick="saveSettings()" class="w-full bg-black text-white py-3 rounded-xl text-xs font-bold mt-4">UPDATE STORE</button>
            </div>
            
            <div id="admin-orders-list" class="space-y-4"></div>
        </div>
    </div>

    <script>
        const MY_UPI_ID = "7210065769@ibl"; 
        const MERCHANT_NAME = "Saif Logo Studio";

        const firebaseConfig = {
            apiKey: "AIzaSyA-5oN6F82QqpoRPzJoMiVO3Ks1A88Xs10",
            authDomain: "saiflogostudio.firebaseapp.com",
            projectId: "saiflogostudio",
            storageBucket: "saiflogostudio.firebasestorage.app",
            messagingSenderId: "763057407060",
            appId: "1:763057407060:web:c17918f45dea1076d299c1"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let prices = { simple: 99, '3d': 199, animation: 499 };
        let finalPrice = 0;
        let isDiscounted = false;

        function updatePrice() {
            const cat = document.getElementById('c-cat').value;
            if(!isDiscounted) finalPrice = prices[cat];
            document.getElementById('price-tag').innerText = "₹" + finalPrice;
            document.getElementById('pay-display-price').innerText = "₹" + finalPrice;
        }

        // 1. ONE-TIME COUPON LOGIC
        async function applyCoupon() {
            const code = document.getElementById('cp-in').value.toUpperCase();
            const phone = document.getElementById('c-phone').value;
            const cat = document.getElementById('c-cat').value;

            if(!phone) return alert("पहले अपना नंबर डालें!");
            if(code !== "WELCOME24") return alert("गलत कूपन कोड!");

            // Check if phone number already used this coupon
            const snap = await db.collection("orders").where("phone", "==", phone).where("coupon", "==", "WELCOME24").get();
            if(!snap.empty) {
                alert("आपने यह कूपन पहले ही इस्तेमाल कर लिया है!");
                return;
            }

            finalPrice = Math.floor(prices[cat] * 0.8);
            isDiscounted = true;
            alert("WELCOME24 Applied! 20% Discount मिला।");
            updatePrice();
        }

        function placeOrder() {
            const n = document.getElementById('c-name').value;
            const ph = document.getElementById('c-phone').value;
            if(!n || !ph) return alert("नाम और नंबर भरें!");

            db.collection("orders").add({
                name: n, phone: ph, idea: document.getElementById('c-idea').value,
                category: document.getElementById('c-cat').value,
                price: finalPrice, status: 'Pending', time: new Date(), 
                adminReply: 'Please wait, order in progress...',
                coupon: isDiscounted ? "WELCOME24" : ""
            }).then(() => {
                confetti();
                sendNotify("Saif Studio", "नया आर्डर आया है!"); // Notification
                document.getElementById('thank-you-screen').style.display = 'flex';
            });
        }

        // 2. TRACKING WITH MANUAL REPLY
        function trackMyOrder() {
            const ph = document.getElementById('tr-num').value;
            db.collection("orders").where("phone", "==", ph).orderBy("time", "desc").limit(1).get().then(snap => {
                const box = document.getElementById('track-box');
                if(snap.empty) {
                    alert("आर्डर नहीं मिला!");
                    box.classList.add('hidden');
                } else {
                    const d = snap.docs[0].data();
                    box.classList.remove('hidden');
                    document.getElementById('st-val').innerText = d.status;
                    document.getElementById('st-reply').innerText = "Saif Says: " + d.adminReply;
                }
            });
        }

        // 3. RATING LOGIC
        function rate(stars) {
            const btns = document.querySelectorAll('.star-btn');
            btns.forEach((b, i) => b.classList.toggle('active', i < stars));
            alert("Thank you for " + stars + " star rating!");
        }

        // 4. BROWSER NOTIFICATION
        function sendNotify(title, body) {
            if (Notification.permission === "granted") {
                new Notification(title, { body });
            } else if (Notification.permission !== "denied") {
                Notification.requestPermission();
            }
        }

        function payViaUPI() {
            window.location.href = `upi://pay?pa=${MY_UPI_ID}&pn=${encodeURIComponent(MERCHANT_NAME)}&am=${finalPrice}&cu=INR&tn=SaifLogoOrder`;
        }

        function showSec(id) {
            document.querySelectorAll('.view-sec').forEach(s => s.classList.add('hidden'));
            document.getElementById('sec-' + id).classList.remove('hidden');
        }

        function checkAdmin() {
            if(prompt("Admin Key:") === "Saif2012") {
                document.getElementById('user-view').classList.add('hidden');
                document.getElementById('admin-view').classList.remove('hidden');
                syncAdmin();
            }
        }

        function syncAdmin() {
            db.collection("orders").orderBy("time", "desc").onSnapshot(snap => {
                let total = snap.size, pending = 0, revenue = 0;
                const list = document.getElementById('admin-orders-list');
                list.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    if(d.status === 'Pending') pending++;
                    if(d.status === 'Done') revenue += Number(d.price);
                    list.innerHTML += `
                        <div class="bg-white p-4 rounded-xl border-l-8 ${d.status==='Pending'?'border-red-500':'border-green-500'} shadow-md">
                            <p class="font-black text-sm">${d.name} | ₹${d.price}</p>
                            <p class="text-[10px] text-gray-400">Phone: ${d.phone} | Status: ${d.status}</p>
                            
                            <textarea id="reply-${doc.id}" placeholder="Reply to user..." class="w-full p-2 border rounded text-xs mt-2 outline-none">${d.adminReply}</textarea>
                            
                            <div class="flex gap-2 mt-2">
                                <button onclick="updateReply('${doc.id}')" class="bg-indigo-600 text-white px-3 py-1 rounded text-[10px] font-bold uppercase tracking-tighter">Update Tracking Message</button>
                                <button onclick="autoDeliver('${doc.id}', '${d.phone}', '${d.name}')" class="bg-green-600 text-white px-3 py-1 rounded text-[10px] font-bold uppercase tracking-tighter">DONE & SEND WHATSAPP</button>
                                <button onclick="delDoc('orders','${doc.id}')" class="text-red-400 text-[10px] ml-auto uppercase font-bold">Cancel</button>
                            </div>
                        </div>`;
                });
                document.getElementById('stat-total').innerText = total;
                document.getElementById('stat-pending').innerText = pending;
                document.getElementById('stat-rev').innerText = "₹" + revenue;
            });
        }

        function updateReply(id) {
            const msg = document.getElementById('reply-' + id).value;
            db.collection("orders").doc(id).update({ adminReply: msg });
            alert("Reply Updated!");
        }

        function autoDeliver(id, phone, name) {
            const msg = `नमस्ते ${name}! आपका लोगो तैयार है। सैफ स्टूडियो का उपयोग करने के लिए धन्यवाद!`;
            db.collection("orders").doc(id).update({ status: 'Done' }).then(() => {
                window.open(`https://wa.me/91${phone}?text=${encodeURIComponent(msg)}`, '_blank');
            });
        }

        function delDoc(col, id) { if(confirm("आर्डर कैंसिल करें?")) db.collection(col).doc(id).delete(); }

        db.collection("settings").doc("main").onSnapshot(doc => {
            if(doc.exists) {
                const d = doc.data();
                document.getElementById('header-offer-display').innerText = d.offerText;
                prices = { simple: d.simple, '3d': d['3d'], animation: d.animation };
                updatePrice();
            }
        });

        function saveSettings() {
            db.collection("settings").doc("main").set({
                offerText: document.getElementById('set-offer-text').value,
                simple: Number(document.getElementById('set-p-simple').value),
                '3d': Number(document.getElementById('set-p-3d').value),
                animation: Number(document.getElementById('set-p-anim').value)
            }).then(() => alert("दुकान अपडेट हो गई!"));
        }
    </script>
</body>
</html>
