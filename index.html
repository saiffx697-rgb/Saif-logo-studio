<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saif Studio | Premium Designs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <style>
        :root { --p-color: #312e81; }
        .bg-primary { background-color: var(--p-color); }
        .view-sec { display: none; }
        .view-sec.active { display: block; }
        #welcome-overlay { position: fixed; inset: 0; background: var(--p-color); z-index: 9999; display: flex; align-items: center; justify-content: center; transition: 0.5s; }
        #side-menu { position: fixed; top: 0; left: -100%; width: 280px; height: 100%; background: white; z-index: 1001; transition: 0.4s; box-shadow: 10px 0 30px rgba(0,0,0,0.1); }
        #side-menu.open { left: 0; }
        .offer-bar { animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="bg-slate-50 font-sans">

    <!-- WELCOME SCREEN -->
    <div id="welcome-overlay">
        <div class="text-center text-white">
            <h1 class="text-4xl font-black italic animate-bounce">WELCOME</h1>
            <p class="text-yellow-400 font-bold tracking-widest">SAIF STUDIO</p>
        </div>
    </div>

    <!-- SIDE MENU (FIXED) -->
    <div id="menu-bg" onclick="toggleMenu()" class="fixed inset-0 bg-black/50 z-[1000] hidden"></div>
    <div id="side-menu">
        <div class="bg-primary p-8 text-white">
            <div class="w-12 h-12 rounded-full border-2 border-yellow-400 mb-2 flex items-center justify-center font-bold">S</div>
            <p class="font-black italic">Saif Studio Menu</p>
        </div>
        <div class="flex flex-col p-2">
            <button onclick="showSec('home')" class="text-left p-4 font-bold border-b">🏠 Home</button>
            <button onclick="showSec('pay-screen')" class="text-left p-4 font-bold border-b text-blue-600">💸 Pay Pending</button>
            <button onclick="showSec('complain')" class="text-left p-4 font-bold text-orange-600 border-b">⚠️ Complaint</button>
        </div>
    </div>

    <!-- NAV BAR -->
    <nav class="bg-primary p-4 text-white flex justify-between items-center sticky top-0 z-[100] shadow-lg">
        <button onclick="toggleMenu()" class="text-2xl">☰</button>
        <h1 onclick="adminSecretTap()" class="font-black italic tracking-tighter cursor-pointer text-lg">SAIF STUDIO</h1>
        <div class="w-8 h-8 rounded-full bg-yellow-400 flex items-center justify-center text-indigo-900 font-black text-xs border-2 border-white">S</div>
    </nav>

    <main class="max-w-4xl mx-auto p-4">
        
        <!-- HOME / ORDER -->
        <section id="sec-home" class="view-sec active py-4">
            <div class="bg-white p-6 rounded-[2rem] shadow-xl border-b-8 border-primary mb-6">
                <h2 class="text-xl font-black text-indigo-900 mb-4 uppercase text-center">Order Your Logo</h2>
                <div class="space-y-4">
                    <select id="c-cat" onchange="updatePrice()" class="w-full p-4 bg-slate-100 rounded-2xl font-bold border">
                        <option value="99">Simple Logo (₹99)</option>
                        <option value="199">3D Logo (₹199)</option>
                        <option value="499">Animation (₹499)</option>
                    </select>

                    <!-- COUPON SYSTEM UI -->
                    <div class="flex gap-2">
                        <input type="text" id="coupon-code" placeholder="Apply Coupon" class="flex-1 p-3 bg-slate-50 border rounded-xl font-bold text-sm uppercase">
                        <button onclick="applyCoupon()" class="bg-indigo-100 text-indigo-700 px-4 rounded-xl font-black text-xs">APPLY</button>
                    </div>

                    <div class="p-4 bg-indigo-50 rounded-2xl text-center border-2 border-dashed border-indigo-200">
                        <span id="price-tag" class="font-black text-indigo-900 text-3xl">₹99</span>
                        <p id="coupon-msg" class="text-[10px] text-green-600 font-bold mt-1 hidden italic">Coupon Applied!</p>
                    </div>

                    <input type="text" id="c-name" placeholder="आपका नाम" class="w-full p-4 bg-slate-100 rounded-2xl border font-bold">
                    <input type="tel" id="c-phone" placeholder="WhatsApp Number" class="w-full p-4 bg-slate-100 rounded-2xl border font-bold">
                    <textarea id="c-idea" placeholder="Logo Idea..." class="w-full p-4 bg-slate-100 rounded-2xl h-24 border font-semibold"></textarea>
                    
                    <button onclick="placeOrder()" class="w-full bg-primary text-white font-black py-5 rounded-2xl shadow-xl uppercase">Confirm Order</button>
                </div>
            </div>
        </section>

        <!-- PAY SCREEN (PENDING PAYMENTS) -->
        <section id="sec-pay-screen" class="view-sec py-4">
            <div class="bg-white p-6 rounded-3xl shadow-xl text-center border-t-8 border-blue-500">
                <h2 class="text-2xl font-black text-indigo-900 mb-2">Pending Payments</h2>
                <p class="text-[10px] text-slate-400 mb-6 font-bold uppercase italic">Apna number enter karke bill check karein</p>
                <div class="flex gap-2 mb-6">
                    <input type="tel" id="search-phone" placeholder="WhatsApp Number" class="flex-1 p-4 bg-slate-100 rounded-2xl border font-bold">
                    <button onclick="loadUserOrders()" class="bg-primary text-white px-6 rounded-2xl font-bold">Search</button>
                </div>
                <div id="user-orders-list" class="space-y-4"></div>
            </div>
        </section>

        <!-- COMPLAINT -->
        <section id="sec-complain" class="view-sec py-4">
            <div class="bg-white p-6 rounded-3xl shadow-xl border-t-8 border-red-500">
                <textarea id="comp-text" placeholder="Apni shikayat likhein..." class="w-full p-4 bg-slate-100 rounded-2xl h-32 border font-bold mb-4"></textarea>
                <button onclick="sendComplaint()" class="w-full bg-red-500 text-white font-black py-4 rounded-2xl uppercase">Submit</button>
            </div>
        </section>

    </main>

    <script>
        // CONFIG & FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyA-5oN6F82QqpoRPzJoMiVO3Ks1A88Xs10",
            authDomain: "saiflogostudio.firebaseapp.com",
            projectId: "saiflogostudio",
            storageBucket: "saiflogostudio.firebasestorage.app",
            messagingSenderId: "763057407060",
            appId: "1:763057407060:web:c17918f45dea1076d299c1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let basePrice = 99;
        let discountedPrice = 99;
        let isCouponApplied = false;

        // UI ACTIONS
        setTimeout(() => { document.getElementById('welcome-overlay').style.display = 'none'; }, 2000);
        
        function toggleMenu() {
            document.getElementById('side-menu').classList.toggle('open');
            document.getElementById('menu-bg').classList.toggle('hidden');
        }

        function showSec(id) {
            document.querySelectorAll('.view-sec').forEach(s => s.classList.remove('active'));
            document.getElementById('sec-' + id).classList.add('active');
            if(!document.getElementById('menu-bg').classList.contains('hidden')) toggleMenu();
        }

        // PRICE & COUPON LOGIC
        function updatePrice() {
            basePrice = Number(document.getElementById('c-cat').value);
            discountedPrice = isCouponApplied ? Math.floor(basePrice * 0.8) : basePrice;
            document.getElementById('price-tag').innerText = "₹" + discountedPrice;
        }

        function applyCoupon() {
            const code = document.getElementById('coupon-code').value.toUpperCase();
            if(code === "SAIF20" || code === "WELCOME") {
                isCouponApplied = true;
                discountedPrice = Math.floor(basePrice * 0.8);
                document.getElementById('price-tag').innerText = "₹" + discountedPrice;
                document.getElementById('coupon-msg').classList.remove('hidden');
                alert("Coupon Applied! 20% Discount mil gaya.");
            } else {
                alert("Invalid Coupon Code!");
            }
        }

        // DATABASE ACTIONS
        function placeOrder() {
            const n = document.getElementById('c-name').value, ph = document.getElementById('c-phone').value;
            if(!n || !ph) return alert("Details bharo!");
            db.collection("orders").add({
                name: n, phone: ph, price: discountedPrice, 
                idea: document.getElementById('c-idea').value,
                payStatus: 'Unpaid', time: new Date()
            }).then(() => {
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
                alert("Order Saved! Pending payment section mein check karein.");
                showSec('pay-screen');
            });
        }

        function loadUserOrders() {
            const ph = document.getElementById('search-phone').value;
            if(!ph) return alert("Number toh dalo!");
            db.collection("orders").where("phone", "==", ph).onSnapshot(snap => {
                const list = document.getElementById('user-orders-list');
                list.innerHTML = snap.empty ? "<p class='font-bold text-red-400'>No orders found.</p>" : "";
                snap.forEach(doc => {
                    const d = doc.data();
                    if(d.payStatus === 'Unpaid') {
                        list.innerHTML += `
                        <div class="bg-slate-50 p-5 rounded-2xl border-2 border-indigo-100 flex justify-between items-center text-left">
                            <div>
                                <p class="font-black text-indigo-900 text-sm">LOGO ORDER</p>
                                <p class="text-xs font-bold text-slate-500 italic">Bill Amount: ₹${d.price}</p>
                            </div>
                            <a href="upi://pay?pa=saif@upi&pn=SaifStudio&am=${d.price}&cu=INR" class="bg-blue-600 text-white px-5 py-2 rounded-xl text-xs font-black shadow-lg shadow-blue-200">PAY NOW</a>
                        </div>`;
                    }
                });
            });
        }

        function sendComplaint() {
            const msg = document.getElementById('comp-text').value;
            if(!msg) return alert("Message likho!");
            db.collection("complaints").add({ message: msg, time: new Date() })
            .then(() => alert("Shikayat darj ho gayi!"));
        }

        // SECRET ADMIN
        let tapCount = 0;
        function adminSecretTap() {
            tapCount++;
            if(tapCount === 3) {
                let p = prompt("Admin Key:");
                if(p === "Saif2012") alert("Admin section restricted in this view.");
                tapCount = 0;
            }
        }
    </script>
</body>
</html>
